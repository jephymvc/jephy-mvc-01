<script>

// COPY
function setupCopy(){
  document.querySelectorAll(".copy-btn").forEach(btn=>{
    btn.onclick=()=>{
      navigator.clipboard.writeText(btn.nextElementSibling.innerText);
      btn.innerText="Copied!";
      setTimeout(()=>btn.innerText="Copy",1500);
    };
  });
}
</script>
